<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ohnotomsutton - media feed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fuzzy+Bubbles:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
        font-family: monospace;
        margin: 10px; 
        padding: 0;
        line-height: 1.3; 
        color: #000; 
        background-color: #fff;
    }

    container {
    display: block;
    max-width: 640px; 
    margin: 10px auto; 
    padding: 0; 
    }

    header {
      margin-bottom: 1rem;
      font-family: 'Fuzzy Bubbles';
    }

    header a {
      text-decoration: none;
    }

    header p {
        font-size: 2rem;
        font-weight: normal; 
        margin: 0;
    }

    h1 {
    font-size: 1.1rem;
    font-weight: bold;
    }

    #tags {
      margin-bottom: 20px;
      font-variant: small-caps;
    }

    button {
      margin: 4px;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 5px;
      border: none;
      font-variant: small-caps;
    }

    button.active {
      color: #333;
      outline: 2px solid #333;
      outline-offset: -2px;
    }

    .entry {
      margin-bottom: 6px;
      border-radius: 3px;
      padding: 5px;
      background-color: #eee;
    }

    .entry-date {
      font-size: 0.85em;
      color: #444;
      font-variant: small-caps;
    }

    .entry-tags {
      font-size: 1em;
      color: #333;
      font-variant: small-caps;
    }
  </style>
</head>
<body>
   <container>
  <header>
    <a href="https://ohnotomsutton.com"><p><span style="color: #ccc">ohno</span>tomsutton</p></a>
  </header>
  <h1>MEDIA FEED</h1>
  <div id="tags"></div>
  <div id="entries"></div>
  <script>
    let activeTag = null;

    fetch('entries.json')
      .then(res => res.json())
      .then(entries => {
        const allTags = [...new Set(entries.flatMap(e => e.tags))];

        const tagContainer = document.getElementById('tags');

        const allBtn = document.createElement('button');
        allBtn.textContent = 'all';
        allBtn.classList.add('active');
        allBtn.onclick = () => {
          activeTag = null;
          render(entries);
          document.querySelectorAll('#tags button').forEach(b => b.classList.remove('active'));
          allBtn.classList.add('active');
        };
        tagContainer.appendChild(allBtn);

        allTags.forEach(tag => {
          const btn = document.createElement('button');
          btn.textContent = tag;
          btn.style.backgroundColor = generatePastelColorRgb();
          btn.onclick = () => {
            activeTag = tag;
            render(entries.filter(e => e.tags.includes(tag)));
            document.querySelectorAll('#tags button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          };
          tagContainer.appendChild(btn);
        });

        render(entries);
      });

    function render(entries) {
      const container = document.getElementById('entries');
      container.innerHTML = '';
      entries.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'entry';
        div.innerHTML = `
          <div class="entry-date">${entry.date}</div>
          <div class="entry-title"><a href="${entry.url}" target="_blank">${entry.title}</a></div>
          <div class="entry-tags">${entry.tags.join(', ')}</div>
        `;
        container.appendChild(div);
      });
    }

  function generatePastelColorRgb() {
    const min = 150; // Minimum value for R, G, and B
    const max = 255; // Maximum value for R, G, and B
    const r = Math.floor(Math.random() * (max - min + 1)) + min;
    const g = Math.floor(Math.random() * (max - min + 1)) + min;
    const b = Math.floor(Math.random() * (max - min + 1)) + min;
    return `rgb(${r}, ${g}, ${b})`;
  }
  </script>
</container>
</body>
</html>
