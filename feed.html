<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed</title>
  <style>
    body {
        font-family: monospace;
        margin: 10px; 
        padding: 0;
        line-height: 1.3; 
        color: #000; 
        background-color: #fff;
    }

    container {
    display: block;
    max-width: 640px; 
    margin: 10px auto; 
    padding: 0; 
    }

    header {
      margin-bottom: 1rem;
      font-family: 'Fuzzy Bubbles';
    }

    header p {
        font-size: 2rem;
        font-weight: normal; 
        margin: 0;
    }

    h1 {
    font-size: 1.1rem;
    font-weight: bold;
    }

    #tags {
      margin-bottom: 20px;
      font-variant: small-caps;
    }

    button {
      margin: 4px;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 5px;
      font-variant: small-caps;
    }

    button.active {
      background: #333;
      color: white;
    }

    .entry {
      margin-bottom: 16px;
    }

    .entry-date {
      font-size: 0.85em;
      color: #666;
      font-variant: small-caps;
    }

    .entry-tags {
      font-size: 0.85em;
      color: #666;
      font-variant: small-caps;
    }
  </style>
</head>
<body>
  <header>
    <p><span style="color: #ccc">ohno</span>tomsutton</p>
  </header>
  <h1>FEED</h1>
  <div id="tags"></div>
  <div id="entries"></div>

  <script>
    let activeTag = null;

    fetch('entries.json')
      .then(res => res.json())
      .then(entries => {
        const allTags = [...new Set(entries.flatMap(e => e.tags))];

        const tagContainer = document.getElementById('tags');

        const allBtn = document.createElement('button');
        allBtn.textContent = 'all';
        allBtn.classList.add('active');
        allBtn.onclick = () => {
          activeTag = null;
          render(entries);
          document.querySelectorAll('#tags button').forEach(b => b.classList.remove('active'));
          allBtn.classList.add('active');
        };
        tagContainer.appendChild(allBtn);

        allTags.forEach(tag => {
          const btn = document.createElement('button');
          btn.textContent = tag;
          btn.onclick = () => {
            activeTag = tag;
            render(entries.filter(e => e.tags.includes(tag)));
            document.querySelectorAll('#tags button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          };
          tagContainer.appendChild(btn);
        });

        render(entries);
      });

    function render(entries) {
      const container = document.getElementById('entries');
      container.innerHTML = '';
      entries.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'entry';
        div.innerHTML = `
          <div class="entry-date">${entry.date}</div>
          <div class="entry-title"><a href="${entry.url}" target="_blank">${entry.title}</a></div>
          <div class="entry-tags">${entry.tags.join(', ')}</div>
        `;
        container.appendChild(div);
      });
    }
  </script>
</body>
</html>
